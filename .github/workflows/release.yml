name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install rust-script
        run: cargo install rust-script

      - name: Build and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: rust-script deploy.rs release
