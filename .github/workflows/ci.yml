name: CI

on:
  pull_request:

permissions: {}

jobs:
  validation:
    name: validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install rust-script
        run: cargo install rust-script
      - name: Run SKILL.md frontmatter validation
        run: ./validation/run.rs

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install rust-script
        run: cargo install rust-script
      - name: Run install.rs integration tests
        run: ./tests/test_install.rs
