name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  validation:
    name: validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SKILL.md frontmatter validation
        run: bash validation/run.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh integration tests
        run: bash tests/test_install.sh
