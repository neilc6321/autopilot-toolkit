name: CI

on:
  pull_request:

permissions: {}

jobs:
  validation:
    name: validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install rust-script
        run: cargo install rust-script
      - name: Run SKILL.md frontmatter validation
        run: rust-script validation/run.rs

  test-rust:
    name: test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install rust-script
        run: cargo install rust-script
      - name: Run deployment contract tests
        run: rust-script --test tests/test_install.rs
      - name: Run toolkit-setup tests
        run: rust-script --test tests/test_toolkit_setup.rs


  test-shell:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install rust-script
        run: cargo install rust-script
      - name: Build tarball
        run: rust-script deploy.rs pack
      - name: Run bootstrap tests
        run: bash tests/test_bootstrap.sh
      - name: Run install tests
        run: bash tests/test_install.sh

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check rust-script formatting
        run: rustfmt --check deploy.rs validation/run.rs crates/validation/src/lib.rs scripts/check.rs scripts/env-check.rs tests/test_build.rs tests/test_install.rs tests/test_toolkit_setup.rs tests/test_check.rs tests/test_github_verify.rs

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy on validation crate
        run: cargo clippy --manifest-path crates/validation/Cargo.toml --all-targets -- -D warnings

  clippy-scripts:
    name: clippy-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install rust-script
        run: cargo install rust-script
      - name: Run clippy on rust-script files
        run: |
          set -e
          for f in deploy.rs validation/run.rs scripts/check.rs scripts/env-check.rs; do
            echo "::group::clippy $f"
            tmpdir=$(mktemp -d)
            rust-script --package --pkg-path "$tmpdir" "$f"
            cargo clippy --manifest-path "$tmpdir/Cargo.toml" -- -D warnings
            rm -rf "$tmpdir"
            echo "::endgroup::"
          done
          for f in tests/test_build.rs tests/test_install.rs tests/test_toolkit_setup.rs \
                   tests/test_check.rs tests/test_github_verify.rs; do
            echo "::group::clippy $f"
            tmpdir=$(mktemp -d)
            rust-script --package --pkg-path "$tmpdir" "$f"
            cargo clippy --manifest-path "$tmpdir/Cargo.toml" --tests -- -D warnings
            rm -rf "$tmpdir"
            echo "::endgroup::"
          done
